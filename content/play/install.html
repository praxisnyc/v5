<ol>
  <li>Download <a href="https://github.com/praxisnyc/play/archive/1.4.zip">latest release</a></li>
  <li>Unzip it and rename as <code>play</code></li>
  <li>Move entire folder inside your huge <code>themes</code> folder</li>
  <li>On <code>config.toml</code> add <code>theme = "play"</code></li>
  <li>Run your hugo normally</li>
</ol>
